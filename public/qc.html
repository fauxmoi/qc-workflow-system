<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QC — Submit Instruction</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; margin-bottom: 24px; }
    label { display: block; margin-bottom: 16px; font-size: 14px; }
    label span { display: block; margin-bottom: 4px; font-weight: 600; }
    input, select, textarea {
      width: 100%; padding: 8px; font-size: 14px;
      border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
    }
    textarea { height: 80px; resize: vertical; }
    button {
      padding: 10px 20px; font-size: 14px; cursor: pointer;
      background: #2563eb; color: #fff; border: none; border-radius: 4px;
    }
    button:hover { background: #1d4ed8; }
    #msg { margin-top: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Submit QC Instruction</h1>

  <label><span>Barrel ID</span><input type="text" id="barrelId" placeholder="e.g. BRL-0042" /></label>
  <label>
    <span>Test Result</span>
    <select id="testResult">
      <option value="">-- Select --</option>
      <option value="Pass">Pass</option>
      <option value="Fail">Fail</option>
    </select>
  </label>
  <label><span>Instruction</span><textarea id="instruction" placeholder="Describe what needs to be done..."></textarea></label>

  <button id="submitBtn">Submit</button>
  <div id="msg"></div>

  <script src="qc.js"></script>
</body>
</html>
