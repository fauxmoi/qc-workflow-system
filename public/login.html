<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline';" />
  <title>Login — Barrel QC System</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 100px auto; padding: 0 16px; }
    h1 { font-size: 20px; margin-bottom: 24px; text-align: center; }
    .login-container {
      border: 1px solid #e5e7eb;
      padding: 24px;
      border-radius: 8px;
      background: #fff;
    }
    label { display: block; margin-bottom: 16px; font-size: 14px; }
    label span { display: block; margin-bottom: 4px; font-weight: 600; }
    input {
      width: 100%; padding: 8px; font-size: 14px;
      border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
    }
    button {
      width: 100%; padding: 10px; font-size: 14px; cursor: pointer;
      background: #2563eb; color: #fff; border: none; border-radius: 4px;
      margin-top: 8px;
    }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #1d4ed8; }
    #error { color: #dc2626; font-size: 13px; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login</h1>

    <label>
      <span>Username</span>
      <input type="text" id="username" placeholder="Enter username"
             autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false" />
    </label>

    <label>
      <span>Password</span>
      <input type="password" id="password" placeholder="Enter password"
             autocomplete="current-password" />
    </label>

    <button id="loginBtn">Sign In</button>
    <div id="error" role="alert" aria-live="polite"></div>
  </div>

  <form id="hiddenForm" style="display: none;"></form>

  <script>
    const ROLE_ROUTES = {
      manager: "manager.html",
      qc:      "qc.html",
      worker:  "worker.html",
    };

    let attempts = 0;
    let lockUntil = 0;

    async function handleLogin() {
      const btn      = document.getElementById("loginBtn");
      const errorDiv = document.getElementById("error");
      errorDiv.textContent = "";

      // Client-side rate limiting
      if (Date.now() < lockUntil) {
        const secs = Math.ceil((lockUntil - Date.now()) / 1000);
        errorDiv.textContent = `Too many attempts. Try again in ${secs}s.`;
        return;
      }

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        errorDiv.textContent = "Please enter both username and password.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (res.ok && ROLE_ROUTES[data.role]) {
          attempts = 0;
          window.location.href = ROLE_ROUTES[data.role];
        } else {
          attempts++;
          if (attempts >= 5) {
            lockUntil = Date.now() + 30_000;   // 30-second lockout
            attempts = 0;
            errorDiv.textContent = "Too many failed attempts. Locked for 30 seconds.";
          } else {
            errorDiv.textContent = data.error || "Invalid username or password.";
          }
        }
      } catch {
        errorDiv.textContent = "Network error. Please try again.";
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign In";
        document.getElementById("password").value = "";
      }
    }

    // Add event listeners instead of inline handlers
    document.addEventListener("DOMContentLoaded", function() {
      const loginBtn = document.getElementById("loginBtn");
      if (loginBtn) {
        loginBtn.addEventListener("click", handleLogin);
      }
      
      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") handleLogin();
      });
    });
  </script>
</body>
</html>
