<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manager — Pending Instructions</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; margin-bottom: 24px; }
    nav { margin-bottom: 24px; font-size: 13px; }
    nav a { margin-right: 12px; color: #2563eb; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
    th { background: #f3f4f6; font-weight: 600; }
    button {
      padding: 6px 12px; font-size: 13px; cursor: pointer;
      border: none; border-radius: 4px; margin-right: 6px;
    }
    .btn-approve { background: #16a34a; color: #fff; }
    .btn-approve:hover { background: #15803d; }
    .btn-reject { background: #dc2626; color: #fff; }
    .btn-reject:hover { background: #b91c1c; }
    #empty { font-size: 14px; color: #6b7280; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Pending Instructions</h1>

  <table id="table">
    <thead>
      <tr>
        <th>Barrel ID</th>
        <th>Test Result</th>
        <th>Instruction</th>
        <th>Submitted</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
   </table>
  <div id="empty" style="display:none;">No pending instructions.</div>

  <script>
    async function load() {
      const res = await fetch("/api/instructions?status=pending");
      const rows = await res.json();
      const tbody = document.getElementById("tbody");
      const empty = document.getElementById("empty");
      tbody.innerHTML = "";

      if (rows.length === 0) { empty.style.display = "block"; return; }
      empty.style.display = "none";

      rows.forEach((r) => {
        const tr = document.createElement("tr");
        const approveBtn = document.createElement("button");
        approveBtn.className = "btn-approve";
        approveBtn.textContent = "Approve";
        approveBtn.addEventListener("click", () => updateStatus(r._id, 'approved'));
        
        const rejectBtn = document.createElement("button");
        rejectBtn.className = "btn-reject";
        rejectBtn.textContent = "Reject";
        rejectBtn.addEventListener("click", () => updateStatus(r._id, 'rejected'));
        
        const actionsCell = document.createElement("td");
        actionsCell.appendChild(approveBtn);
        actionsCell.appendChild(rejectBtn);
        
        tr.innerHTML = `
          <td>${r.barrelId}</td>
          <td>${r.testResult}</td>
          <td>${r.instruction}</td>
          <td>${new Date(r.createdAt).toLocaleString()}</td>
        `;
        tr.appendChild(actionsCell);
        tbody.appendChild(tr);
      });
    }

    async function updateStatus(id, status) {
      await fetch(`/api/instructions/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status }),
      });
      load();
    }

    load();
  </script>
</body>
</html>
