<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Worker — Approved Instructions</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; margin-bottom: 24px; }
    nav { margin-bottom: 24px; font-size: 13px; }
    nav a { margin-right: 12px; color: #2563eb; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
    th { background: #f3f4f6; font-weight: 600; }
    button {
      padding: 6px 12px; font-size: 13px; cursor: pointer;
      background: #2563eb; color: #fff; border: none; border-radius: 4px;
    }
    button:hover { background: #1d4ed8; }
    #empty { font-size: 14px; color: #6b7280; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Approved Instructions</h1>

  <table id="table">
    <thead>
      <tr>
        <th>Barrel ID</th>
        <th>Test Result</th>
        <th>Instruction</th>
        <th>Approved At</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" style="display:none;">No approved instructions.</div>

  <script>
    async function load() {
      const res = await fetch("/api/instructions?status=approved");
      const rows = await res.json();
      const tbody = document.getElementById("tbody");
      const empty = document.getElementById("empty");
      tbody.innerHTML = "";

      if (rows.length === 0) { empty.style.display = "block"; return; }
      empty.style.display = "none";

      rows.forEach((r) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.barrelId}</td>
          <td>${r.testResult}</td>
          <td>${r.instruction}</td>
          <td>${new Date(r.updatedAt || r.createdAt).toLocaleString()}</td>
          <td>
            <button onclick="markDone('${r.id}')">Mark as Done</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function markDone(id) {
      await fetch(`/api/instructions/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: "completed" }),
      });
      load();
    }

    load();
  </script>
</body>
</html>
